{% extends "app_base.html" %}

{% block content %}
<div class="glass-panel">
    <div class="net-tabs" style="display: flex; gap: 10px; margin-bottom: 30px;">
        <button onclick="showTab('chat')" class="tab-btn active" id="tab-btn-chat">💬 Chat</button>
        <button onclick="showTab('wifi')" class="tab-btn" id="tab-btn-wifi">📶 Wi-Fi</button>
    </div>

    <div id="tab-chat" class="tab-content">
        <div id="chatHistory" style="height: 300px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; margin-bottom: 20px;"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chatInput" placeholder="Message..." style="flex: 1;">
            <button onclick="sendChat()">Send</button>
        </div>
    </div>

    <div id="tab-wifi" class="tab-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Available Networks</h3>
            <button onclick="scanWifi()">Scan</button>
        </div>
        <div id="wifiList" style="display: grid; gap: 10px;">
            <div style="color: var(--text-dim);">Scanning for networks...</div>
        </div>
    </div>
</div>

<style>
    .tab-btn { background: rgba(255,255,255,0.05); color: var(--text-dim); }
    .tab-btn.active { background: var(--accent-primary); color: white; }
    .wifi-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .wifi-info { display: flex; flex-direction: column; }
    .wifi-ssid { font-weight: 700; }
    .wifi-meta { font-size: 11px; color: var(--text-dim); }
</style>

<script>
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).style.display = 'block';
        document.getElementById('tab-btn-' + id).classList.add('active');
        if (id === 'wifi') scanWifi();
    }

    async function sendChat() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        await fetch('/app/network/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text})
        });
        input.value = '';
        loadChat();
    }

    async function loadChat() {
        const res = await fetch('/app/network/api/chat');
        const messages = await res.json();
        const history = document.getElementById('chatHistory');
        history.innerHTML = messages.map(m => `
            <div style="margin-bottom: 10px;">
                <span style="font-weight: 700; color: var(--accent-primary);">${m.sender}:</span>
                <span>${m.text}</span>
            </div>
        `).join('');
        history.scrollTop = history.scrollHeight;
    }

    async function scanWifi() {
        const list = document.getElementById('wifiList');
        list.innerHTML = '<div style="color: var(--text-dim);">Scanning...</div>';
        try {
            const res = await fetch('/app/network/api/wifi/scan');
            const networks = await res.json();
            list.innerHTML = networks.map(n => `
                <div class="wifi-card">
                    <div class="wifi-info">
                        <span class="wifi-ssid">${n.ssid || '[Hidden Network]'}</span>
                        <span class="wifi-meta">${n.security} · Signal: ${n.signal}%</span>
                    </div>
                    <button onclick="connectWifi('${n.ssid}')" style="padding: 8px 16px; font-size: 12px;">Connect</button>
                </div>
            `).join('');
        } catch(e) {
            list.innerHTML = '<div style="color: #ef4444;">Failed to scan networks.</div>';
        }
    }

    window.connectWifi = async (ssid) => {
        const password = prompt(`Enter password for ${ssid}:`);
        if (password === null) return;
        
        try {
            const res = await fetch('/app/network/api/wifi/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ssid, password})
            });
            const data = await res.json();
            if (data.error) alert("Error: " + data.error);
            else alert("Connected successfully!");
        } catch(e) {
            alert("Failed to connect.");
        }
    };

    setInterval(loadChat, 3000);
    loadChat();
</script>
{% endblock %}
