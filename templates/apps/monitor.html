{% extends "app_base.html" %}
{% block head %}
<style>
.mon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.mon-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px; }
.mon-big { font-size: 36px; text-align: center; margin: 12px 0; }
</style>
{% endblock %}
{% block content %}
<div class="mon-grid" id="monGrid">
    <div class="mon-card">
        <h3>📈 System Performance</h3>
        <div class="mon-big">Monitoring Active</div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    function update(){
        fetch('/app/monitor/api/history').then(r=>r.json()).then(d=>{
            console.log(d);
        });
    }
    update();
    setInterval(update, 5000);
})();
</script>
{% endblock %}
