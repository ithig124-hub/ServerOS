<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ manifest.name }} - ServerOS</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            padding: 40px 24px; 
            background: #000;
            overflow-y: auto;
            height: auto;
            display: block;
        }
        .app-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            animation: fadeInScale 0.5s ease-out;
        }
        .app-header { 
            display: flex; 
            align-items: center; 
            gap: 24px; 
            margin-bottom: 50px; 
        }
        .app-icon-large { 
            font-size: 3.5rem; 
            width: 96px; 
            height: 96px; 
            background: {{ manifest.color }}; 
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .app-icon-large::after {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), transparent 60%);
        }
        .app-title-group h1 { font-size: 2.5rem; font-weight: 800; color: #fff; letter-spacing: -1px; }
        .app-title-group p { font-size: 1.1rem; color: var(--text-dim); font-weight: 500; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        button {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        button:active { transform: translateY(0); scale: 0.98; }
        
        input, select, textarea {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: var(--accent-primary); background: rgba(255,255,255,0.1); }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-icon-large">{{ manifest.icon }}</div>
            <div class="app-title-group">
                <h1>{{ manifest.name }}</h1>
                <p>{{ manifest.description }}</p>
            </div>
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
