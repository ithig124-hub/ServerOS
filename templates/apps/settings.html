{% extends "app_base.html" %}

{% block content %}
<div style="display: grid; gap: 24px; padding-bottom: 60px;">
    <!-- Data Management -->
    <div class="glass-panel">
        <h3 style="margin-bottom: 10px; display: flex; align-items: center; gap: 10px;">📦 Data Backup</h3>
        <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 20px;">Download all your app data, notes, and logs as a single ZIP file.</p>
        <button onclick="window.location.href='/app/settings/api/backup/download'" style="width: 100%; background: #059669;">📥 Download All Data (.zip)</button>
    </div>

    <!-- Wi-Fi Hotspot -->
    <div class="glass-panel">
        <h3 style="margin-bottom: 10px; display: flex; align-items: center; gap: 10px;">📡 Wi-Fi Hotspot</h3>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div id="hotspotStatus" style="font-weight: 700;">Checking...</div>
                <div style="font-size: 11px; color: var(--text-dim);">SSID: ServerOS | Pass: SeRVEROS</div>
            </div>
            <button id="hotspotBtn" onclick="toggleHotspot()" style="background: rgba(255,255,255,0.1);">Toggle</button>
        </div>
    </div>

    <!-- Tailscale VPN -->
    <div class="glass-panel">
        <h3 style="margin-bottom: 10px; display: flex; align-items: center; gap: 10px;">🛡️ Tailscale VPN</h3>
        <div id="tsStatus" style="margin-bottom: 20px; font-weight: 700;">Checking status...</div>
        <div style="display: grid; gap: 12px;">
            <input type="text" id="tsAuthKey" placeholder="Tailscale Auth Key (tskey-...)" style="width: 100%;">
            <button onclick="connectTailscale()" style="background: #2d333b;">Headless Connect</button>
        </div>
    </div>

    <!-- System Update -->
    <div class="glass-panel">
        <h3 style="margin-bottom: 10px;">🔄 Update Engine</h3>
        <div id="versionInfo" style="margin-bottom: 20px; color: var(--text-dim); font-size: 12px;">...</div>
        <button id="updateBtn" onclick="runUpdate()" style="width: 100%;">Run Git Update</button>
    </div>
</div>

<script>
let _status = {};

async function loadStatus() {
    try {
        const res = await fetch('/app/settings/api/status');
        _status = await res.json();
        document.getElementById('versionInfo').innerText = `Branch: ${_status.branch} | Commit: ${_status.commit}`;
        document.getElementById('hotspotStatus').innerText = _status.hotspot === 'active' ? '🟢 Hotspot: ON' : '🔴 Hotspot: OFF';
        document.getElementById('tsStatus').innerText = _status.tailscale === 'connected' ? '🟢 Tailscale: Connected' : '🔴 Tailscale: Logged Out';
    } catch (e) {}
}

async function runUpdate() {
    if (!confirm("Pull latest code? Data is preserved.")) return;
    const btn = document.getElementById('updateBtn');
    btn.disabled = true; btn.innerText = "Updating...";
    try {
        const res = await fetch('/app/settings/api/update', { method: 'POST' });
        const d = await res.json();
        alert(d.status || d.error);
    } catch (e) { alert("Update failed."); }
    btn.disabled = false; btn.innerText = "Run Git Update";
}

async function toggleHotspot() {
    const enable = _status.hotspot !== 'active';
    await fetch('/app/settings/api/hotspot/toggle', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enable})
    });
    loadStatus();
}

async function connectTailscale() {
    const auth_key = document.getElementById('tsAuthKey').value.trim();
    if (!auth_key) return alert("Enter key.");
    const res = await fetch('/app/settings/api/tailscale/connect', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({auth_key})
    });
    const d = await res.json();
    alert(d.status || d.error);
    loadStatus();
}

loadStatus();
</script>
{% endblock %}
