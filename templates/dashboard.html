<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerOS</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/static/pwa/manifest.json">
    <style>
        /* --- Amazing Boot Splash --- */
        #loadingSplash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        
        .boot-logo-container {
            position: relative; width: 120px; height: 120px; margin-bottom: 40px;
        }
        
        .boot-logo-ring {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid rgba(99, 102, 241, 0.1); border-top-color: #6366f1;
            border-radius: 50%; animation: spin 1.5s linear infinite;
        }
        
        .boot-logo-inner {
            position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 28px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        .boot-text-container {
            text-align: center; font-family: monospace;
        }
        
        .boot-status { font-size: 14px; color: #6366f1; letter-spacing: 2px; font-weight: 800; margin-bottom: 10px; }
        .boot-terminal { font-size: 11px; color: rgba(255,255,255,0.4); height: 20px; min-width: 250px; }

        /* Tooltips */
        .dock-icon { position: relative; }
        .dock-icon::after {
            content: attr(data-label);
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; border-radius: 8px;
            font-size: 11px; font-weight: 700; opacity: 0; pointer-events: none; transition: 0.2s;
            white-space: nowrap; border: 1px solid rgba(255,255,255,0.1);
        }
        .dock-icon:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <!-- Amazing Boot Sequence -->
    <div id="loadingSplash">
        <div class="boot-logo-container">
            <div class="boot-logo-ring"></div>
            <div class="boot-logo-inner">
                <span style="font-size: 3rem;">⚡</span>
            </div>
        </div>
        <div class="boot-text-container">
            <div class="boot-status">SERVEROS V4</div>
            <div class="boot-terminal" id="bootTerminal">Initializing...</div>
        </div>
    </div>

    <div class="wallpaper-bg" id="wallpaperBg"></div>
    <div class="wallpaper-overlay"></div>

    <div class="dashboard-shell">
        <header class="top-greeting">
            <h1 class="greeting-text" id="greetingText">Good evening, Ithiel.</h1>
        </header>

        <section class="content-section active" id="sectionHome">
            <div class="widget-bar">
                <div class="widget-card">
                    <div class="widget-label">Storage</div>
                    <div class="widget-value" id="storageWidgetText">...</div>
                    <div class="progress-wrap">
                        <div class="progress-fill" id="storageWidgetFill"></div>
                    </div>
                </div>
                
                <div class="widget-card">
                    <div class="metrics-icons">
                        <div class="metric-mini">
                            <span class="metric-mini-label">TEMP</span>
                            <span class="metric-mini-val" id="tempValue">--°C</span>
                        </div>
                        <div class="metric-mini">
                            <span class="metric-mini-label">CPU</span>
                            <span class="metric-mini-val" id="cpuValue">--%</span>
                        </div>
                        <div class="metric-mini">
                            <span class="metric-mini-label">MEMORY</span>
                            <span class="metric-mini-val" id="ramValue">--GB</span>
                        </div>
                    </div>
                </div>

                <div class="widget-card">
                    <div class="widget-label">System Health</div>
                    <div class="widget-value">Optimal</div>
                    <div class="progress-wrap">
                        <div class="progress-fill" style="width: 100%; background: #22c55e;"></div>
                    </div>
                </div>
            </div>

            <div class="app-grid" id="homeAppGrid"></div>

            <div class="paging-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
            </div>

            <div class="search-bar-wrap" onclick="openSearch()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span class="search-bar-text">Search</span>
            </div>
        </section>

        <section class="content-section" id="sectionAppStore">
            <div class="top-greeting" style="margin-bottom: 30px;">
                <h1 class="greeting-text">App Grid</h1>
            </div>
            <div class="app-grid" id="fullAppGrid"></div>
        </section>

        <nav class="bottom-dock">
            <a href="#" class="dock-icon active" data-section="home" data-label="Home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
            <a href="#" class="dock-icon" data-section="appstore" data-label="App Grid">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            </a>
            <a href="/app/settings" class="dock-icon" data-label="Settings">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </a>
        </nav>
    </div>

    <div class="app-frame-overlay" id="appFrameOverlay">
        <div class="app-frame-topbar">
            <button class="app-frame-back-btn" onclick="closeAppFrame()">← Back</button>
            <span class="app-frame-title" id="appFrameTitle">App</span>
        </div>
        <iframe class="app-frame-iframe" id="appFrameIframe"></iframe>
    </div>

    <script src="/static/js/dashboard.js"></script>
    <script>
        // Boot Sequence Terminal Text
        const term = document.getElementById('bootTerminal');
        const sequences = [
            "Initializing Kernel...",
            "Checking Hardware...",
            "Pi Zero 2 W Detected",
            "Loading User Profile: Ithiel...",
            "Starting Command Center...",
            "System Ready."
        ];
        
        let seqIdx = 0;
        const seqTimer = setInterval(() => {
            if (seqIdx < sequences.length) {
                term.innerText = sequences[seqIdx];
                seqIdx++;
            } else {
                clearInterval(seqTimer);
                dismissSplash();
            }
        }, 400);

        function dismissSplash() {
            const splash = document.getElementById('loadingSplash');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(1.1)';
            setTimeout(() => splash.style.display = 'none', 1200);
        }
        
        // PWA Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/pwa/sw.js');
        }
    </script>
</body>
</html>
