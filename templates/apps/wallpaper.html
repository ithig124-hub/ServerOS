{% extends "app_base.html" %}
{% block head %}
<style>
.wp-section { margin-bottom: 32px; padding: 24px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
.wp-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
.wp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
.wp-card { height: 110px; border-radius: 16px; cursor: pointer; position: relative; overflow: hidden; border: 2px solid transparent; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.wp-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
.wp-card.active { border-color: var(--accent-primary); box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
.wp-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); font-size: 12px; font-weight: 600; }

/* Pin Apps specific */
.pin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
.pin-item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px; border-radius: 16px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; position: relative; }
.pin-item:hover { background: rgba(255,255,255,0.05); }
.pin-item.selected { background: rgba(99, 102, 241, 0.15); border-color: var(--accent-primary); }
.pin-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(255,255,255,0.1); }
.pin-name { font-size: 11px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.pin-badge { position: absolute; top: 5px; right: 5px; background: var(--accent-primary); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; transform: scale(0); transition: 0.2s; }
.pin-item.selected .pin-badge { transform: scale(1); }

.save-bar { position: sticky; bottom: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 16px; margin: 0 -20px -40px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-end; gap: 12px; z-index: 100; }
.btn { padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
.btn-primary { background: var(--accent-primary); color: white; }
.btn-secondary { background: rgba(255,255,255,0.1); color: white; }
</style>
{% endblock %}

{% block content %}
<div class="wp-section">
    <h3>📌 Home Pinned Apps (Select 6)</h3>
    <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 20px;">Choose which apps appear on your main dashboard screen.</p>
    <div class="pin-grid" id="pinGrid">
        <div style="padding: 20px; color: var(--text-dim);">Loading apps...</div>
    </div>
</div>

<div class="wp-section">
    <h3>🌈 Gradients & Backgrounds</h3>
    <div class="wp-grid" id="gradientGrid"></div>
</div>

<div class="wp-section">
    <h3>🖼 Wallpapers</h3>
    <div class="wp-grid" id="imageGrid"></div>
</div>

<div class="save-bar">
    <div id="pinCount" style="margin-right: auto; align-self: center; font-weight: 600; font-size: 14px; color: var(--text-dim);">0 / 6 Selected</div>
    <button class="btn btn-secondary" onclick="location.reload()">Reset</button>
    <button class="btn btn-primary" onclick="savePinned()">Save Configuration</button>
</div>

<script>
(function(){
    const gradients = [
        { name:'Midnight', value:'linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e)' },
        { name:'Deep Space', value:'linear-gradient(135deg, #0f0c29, #302b63, #24243e)' },
        { name:'Ocean Blue', value:'linear-gradient(135deg, #0f2027, #203a43, #2c5364)' },
        { name:'Purple Dusk', value:'linear-gradient(135deg, #2c3e50, #000000)' },
    ];
    const images = [
        { name:'Umbrel Dark', value:'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1920&q=80' },
        { name:'Abstract Flow', value:'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=1920&q=80' },
        { name:'Cosmic', value:'https://images.unsplash.com/photo-1464802686167-b939a6910659?w=1920&q=80' }
    ];

    let currentWP = null;
    let allApps = [];
    let selectedAppIds = [];

    async function init() {
        const [wpRes, appsRes, pinnedRes] = await Promise.all([
            fetch('/api/wallpaper'),
            fetch('/api/apps'),
            fetch('/app/wallpaper/api/pinned')
        ]);
        
        currentWP = await wpRes.json();
        allApps = await appsRes.json();
        selectedAppIds = await pinnedRes.json();

        renderApps();
        renderWallpapers();
    }

    function renderApps() {
        const grid = document.getElementById('pinGrid');
        grid.innerHTML = allApps.map(app => {
            const isSelected = selectedAppIds.includes(app.id);
            const index = selectedAppIds.indexOf(app.id) + 1;
            return `
                <div class="pin-item ${isSelected ? 'selected' : ''}" onclick="togglePin('${app.id}')">
                    <div class="pin-badge">${index}</div>
                    <div class="pin-icon" style="background: ${app.color}22; color: ${app.color}">${app.icon}</div>
                    <div class="pin-name">${app.name}</div>
                </div>`;
        }).join('');
        document.getElementById('pinCount').innerText = `${selectedAppIds.length} / 6 Selected`;
    }

    window.togglePin = (id) => {
        const idx = selectedAppIds.indexOf(id);
        if (idx > -1) {
            selectedAppIds.splice(idx, 1);
        } else {
            if (selectedAppIds.length >= 6) {
                alert("Maximum 6 apps can be pinned to home.");
                return;
            }
            selectedAppIds.push(id);
        }
        renderApps();
    };

    function renderWallpapers() {
        document.getElementById('gradientGrid').innerHTML = gradients.map(g => `
            <div class="wp-card ${currentWP.type==='gradient' && currentWP.value===g.value ? 'active' : ''}" 
                 style="background:${g.value}" onclick="saveWP('gradient', '${g.value}')">
                <div class="wp-label">${g.name}</div>
            </div>`).join('');
        
        document.getElementById('imageGrid').innerHTML = images.map(i => `
            <div class="wp-card ${currentWP.type==='image' && currentWP.value===i.value ? 'active' : ''}" 
                 style="background:url('${i.value}') center/cover" onclick="saveWP('image', '${i.value}')">
                <div class="wp-label">${i.name}</div>
            </div>`).join('');
    }

    window.saveWP = async (type, value) => {
        currentWP = {type, value};
        await fetch('/api/wallpaper', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(currentWP)
        });
        renderWallpapers();
    };

    window.savePinned = async () => {
        const res = await fetch('/app/wallpaper/api/pinned', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(selectedAppIds)
        });
        if (res.ok) alert("Home screen configuration saved!");
    };

    init();
})();
</script>
{% endblock %}
